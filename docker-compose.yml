services:
  mysql:
    image: mysql:8.0
    container_name: second-hand-mysql
    restart: unless-stopped
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_0900_ai_ci
    environment:
      TZ: ${TZ:-Asia/Hong_Kong}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-second_hand_trading}
      MYSQL_USER: ${MYSQL_USER:-trading}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-trading123}
    volumes:
      - ./deploy-data/mysql:/var/lib/mysql
      - ./second_hand_trading.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "export MYSQL_PWD=\"$${MYSQL_ROOT_PASSWORD}\"; mysqladmin ping -h 127.0.0.1 -uroot --silent"]
      start_period: 45s
      interval: 10s
      timeout: 5s
      retries: 20

  server:
    build:
      context: .
      dockerfile: Server/Dockerfile
    container_name: second-hand-server
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      TZ: ${TZ:-Asia/Hong_Kong}
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USERNAME: ${MYSQL_USER:-trading}
      DB_PASSWORD: ${MYSQL_PASSWORD:-trading123}
      USER_FILE_PATH: /app/userFile
      BASE_URL: ${PUBLIC_BASE_URL:-http://localhost}/api
      JAVA_OPTS: ${JAVA_OPTS:-}
    volumes:
      - ./userFile:/app/userFile

  web:
    build:
      context: .
      dockerfile: WebApp/Dockerfile
      args:
        VUE_APP_BASE_API: /api
    container_name: second-hand-web
    restart: unless-stopped
    depends_on:
      - server
    ports:
      - "${HTTP_PORT:-80}:80"
